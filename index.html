<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Em_Q | Your Pocket Companion</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: linear-gradient(135deg, #0a0a2e, #0d1b4b, #0a2a4a);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', sans-serif;
            color: white;
            padding: 20px;
        }

        #splash-screen {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: linear-gradient(135deg, #0a0a2e, #0d1b4b, #0a2a4a);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 999;
        }

        #splash-screen.hide { animation: fadeOut 1s ease forwards; }

        @keyframes fadeOut {
            from { opacity: 1; }
            to { opacity: 0; visibility: hidden; }
        }

        #splash-logo {
            font-size: 100px;
            filter: drop-shadow(0 0 30px #00d4ff);
            animation: float 3s ease-in-out infinite;
            margin-bottom: 20px;
        }

        #splash-title {
            font-size: 3rem;
            color: #00d4ff;
            text-shadow: 0 0 30px #00d4ff;
            letter-spacing: 8px;
            margin-bottom: 10px;
        }

        #splash-tagline {
            font-size: 1rem;
            color: #a0c4d8;
            letter-spacing: 3px;
            margin-bottom: 40px;
        }

        #splash-btn {
            background: transparent;
            border: 2px solid #00d4ff;
            color: #00d4ff;
            padding: 15px 40px;
            border-radius: 50px;
            font-size: 1rem;
            cursor: pointer;
            letter-spacing: 2px;
            transition: all 0.3s ease;
        }

        #splash-btn:hover {
            background: #00d4ff;
            color: #0a0a2e;
            box-shadow: 0 0 30px #00d4ff;
            transform: scale(1.05);
        }

        #main-app {
            display: none;
            flex-direction: column;
            align-items: center;
            width: 100%;
            max-width: 600px;
        }

        #lulo-face {
            font-size: 90px;
            margin-bottom: 10px;
            filter: drop-shadow(0 0 20px #00d4ff);
            animation: float 3s ease-in-out infinite;
            display: inline-block;
        }

        #lulo-face.nod { animation: nod 0.5s ease; }
        #lulo-face.shake { animation: shake 0.5s ease; }

        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-15px); }
            100% { transform: translateY(0px); }
        }

        @keyframes nod {
            0% { transform: translateY(0px); }
            25% { transform: translateY(-20px); }
            50% { transform: translateY(0px); }
            75% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }

        @keyframes shake {
            0% { transform: translateX(0px); }
            20% { transform: translateX(-15px); }
            40% { transform: translateX(15px); }
            60% { transform: translateX(-15px); }
            80% { transform: translateX(15px); }
            100% { transform: translateX(0px); }
        }

        #lulo-reaction {
            font-size: 1rem;
            color: #00d4ff;
            margin-bottom: 15px;
            min-height: 24px;
            text-align: center;
        }

        h1 {
            font-size: 2rem;
            color: #00d4ff;
            text-shadow: 0 0 20px #00d4ff;
            margin-bottom: 10px;
            text-align: center;
        }

        p.subtitle {
            font-size: 1rem;
            color: #a0c4d8;
            margin-bottom: 30px;
            text-align: center;
        }

        #mood-buttons {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            justify-content: center;
            margin-bottom: 30px;
        }

        button {
            background: rgba(0, 212, 255, 0.1);
            border: 2px solid #00d4ff;
            color: white;
            padding: 10px 18px;
            border-radius: 50px;
            font-size: 0.9rem;
            cursor: pointer;

            background: #00d4ff;
            color: #0a0a2e;
            transform: scale(1.1);
            box-shadow: 0 0 20px #00d4ff;

        #scripture-box {
            background: rgba(0, 212, 255, 0.05);
            border: 1px solid rgba(0, 212, 255, 0.3);
            border-radius: 20px;
            padding: 25px;
            width: 100%;
            text-align: center;
            display: none;
            animation: fadeIn 0.8s ease;
            margin-bottom: 20px;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }

            font-size: 0.95rem;
            line-height: 1.8;
            color: #e0f4ff;
            margin-bottom: 20px;
            white-space: pre-line;
        }

        #loading-text {
            font-size: 0.9rem;
            color: #00d4ff;
            display: none;
            margin-bottom: 10px;

        #another-btn {

        #footer {

            color: rgba(255,255,255,0.2);

    </style>
</head>
