        // Check if user already has a saved name
        const savedName = localStorage.getItem('luloUserName')

        function enterNameScreen() {
            const splash = document.getElementById('splash-screen')
            splash.classList.add('hide')

            setTimeout(() => {
                // If we already know their name → skip to welcome
                if (savedName) {
                    showReturningWelcome(savedName)
                } else {
                    // First time → show name entry
                    document.getElementById('name-screen').style.display = 'flex'
                }
            }, 800)
        }

        function saveName() {
            const nameInput = document.getElementById('name-input')
            const name = nameInput.value.trim()

            if (!name) {
                nameInput.style.borderColor = 'red'
                nameInput.placeholder = 'Please enter your name 😊'
                setTimeout(() => {
                    nameInput.style.borderColor = '#00d4ff'
                    nameInput.placeholder = 'Enter your name...'
                }, 2000)
                return
            }

            // Save name forever
            localStorage.setItem('luloUserName', name)

            // Hide name screen
            document.getElementById('name-screen').style.display = 'none'

            // Show first time welcome
            showFirstTimeWelcome(name)
        }

        function showFirstTimeWelcome(name) {
            const welcomeScreen = document.getElementById('welcome-screen')
            const welcomeMessage = document.getElementById('welcome-message')
            const welcomeSubtext = document.getElementById('welcome-subtext')
            const welcomeBtn = document.getElementById('welcome-btn')

            welcomeMessage.innerText = `It's so lovely to meet you, ${name}! 🎉`
            welcomeSubtext.innerText = `I'm Lulo, your pocket companion.\nI'm here whenever you need me — day or night.\nYou never have to face anything alone. 💙`
            welcomeBtn.innerText = `I'M READY, LULO →`

            welcomeScreen.style.display = 'flex'
        }

        function showReturningWelcome(name) {
            const welcomeScreen = document.getElementById('welcome-screen')
            const welcomeMessage = document.getElementById('welcome-message')
            const welcomeSubtext = document.getElementById('welcome-subtext')
            const welcomeBtn = document.getElementById('welcome-btn')

            const returningMessages = [
                `Welcome back, ${name}! 💙`,
                `${name}! I've been thinking about you. 🤗`,
                `There you are, ${name}! I'm so glad you're back. ✨`,
            ]

            const randomMsg = returningMessages[Math.floor(Math.random() * returningMessages.length)]

            welcomeMessage.innerText = randomMsg
            welcomeSubtext.innerText = `How are you feeling today?\nI'm here and I'm listening. 💙`
            welcomeBtn.innerText = `TALK TO LULO →`

            welcomeScreen.style.display = 'flex'
        }

        function enterMainApp() {
            document.getElementById('welcome-screen').style.display = 'none'
            const app = document.getElementById('main-app')
            app.style.display = 'flex'

            // Update greeting in main app with user's name
            const name = localStorage.getItem('luloUserName')
            if (name) {
                document.querySelector('h1').innerText = `Hi ${name}, I'm Lulo!`
            }
        }

        function animateLulo(type) {
            const luloFace = document.getElementById('lulo-face')
            luloFace.classList.remove('nod', 'shake')
            void luloFace.offsetWidth
            luloFace.classList.add(type)
        }

        function showScripture(mood) {
    currentMood = mood
    const list = specialVerses[mood]

    // Smart shuffle - no repeats until all verses shown
    if (!window.shownVerses) window.shownVerses = {}
    if (!window.shownVerses[mood] || window.shownVerses[mood].length === 0) {
        window.shownVerses[mood] = [...Array(list.length).keys()]
    }
    const randomIndex = Math.floor(Math.random() * window.shownVerses[mood].length)
    const verseIndex = window.shownVerses[mood].splice(randomIndex, 1)[0]
    const verse = list[verseIndex]

            const reactionList = reactions[mood]
            const randomReaction = Math.floor(Math.random() * reactionList.length)

            document.getElementById('lulo-face').innerText = faces[mood]
            document.getElementById('lulo-reaction').innerText = reactionList[randomReaction]
            animateLulo('nod')

            const box = document.getElementById('scripture-box')
            const text = document.getElementById('scripture-text')
            const anotherBtn = document.getElementById('another-btn')

            text.innerText = verse.text + "\n\n— " + verse.ref
            box.style.display = 'block'
            anotherBtn.style.display = 'inline-block'

            box.style.animation = 'none'
            void box.offsetHeight
            box.style.animation = 'fadeIn 0.8s ease'
        }

        function showAnother() {
            animateLulo('shake')
            setTimeout(() => { showScripture(currentMood) }, 300)
        }
